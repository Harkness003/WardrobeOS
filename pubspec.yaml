name: wardrobeos
description: Base complete et evolutive de WardrobeOS.
publish_to: "none"
version: 0.8.0+9

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.3
  path: ^1.9.1
  path_provider: ^2.1.5
  image_picker: ^1.2.1
  uuid: ^4.5.3
  image: ^4.9.1
  google_mlkit_image_labeling: ^0.14.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  http: ^1.4.0
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
